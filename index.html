<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🤝 Canlı & Online Ateşkes Merkezi</title>

<style>
body {
    font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    background: #0f172a;
    color: #f8fafc;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: flex-start;
    min-height: 100vh;
    margin: 0;
    padding: 20px;
    box-sizing: border-box;
    transition: background 0.8s ease;
}

.container {
    display: flex;
    flex-direction: column;
    gap: 20px;
    width: 440px;
    max-width: 100%;
}

/* 🚪 GİRİŞ EKRANI STİLİ */
.login-screen {
    background: #1e293b;
    padding: 30px;
    border-radius: 20px;
    border: 1px solid #334155;
    text-align: center;
    box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.3);
}

.card {
    background: #1e293b;
    padding: 28px;
    border-radius: 20px;
    box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.3);
    border: 1px solid #334155;
    transition: all 0.5s ease;
}

h1, h2 { margin-top: 0; margin-bottom: 15px; text-align: center; }
h1 { font-size: 24px; }
h2 { font-size: 18px; color: #3b82f6; }

label { font-size: 13px; color: #94a3b8; font-weight: 600; display: block; margin-top: 10px; }

input, textarea {
    width: 100%;
    padding: 12px 16px;
    margin-top: 6px;
    border: 2px solid #334155;
    border-radius: 10px;
    box-sizing: border-box;
    background: #0f172a;
    color: white;
    font-size: 14px;
    transition: all 0.3s ease;
}

textarea { resize: none; height: 50px; font-family: inherit; }
input:focus, textarea:focus { outline: none; border-color: #3b82f6; }

.btn-group { display: flex; gap: 10px; margin-top: 16px; }
button {
    flex: 1;
    padding: 12px;
    border: none;
    border-radius: 10px;
    cursor: pointer;
    font-weight: 600;
    font-size: 14px;
    transition: all 0.2s ease;
}
button:active { transform: scale(0.98); }

.accept { background: #10b981; color: white; }
.accept:hover:not(:disabled) { background: #059669; }
.reject { background: #ef4444; color: white; }
.reject:hover:not(:disabled) { background: #dc2626; }
.reset { background: #475569; color: #cbd5e1; width: 100%; margin-top: 15px; }
.reset:hover { background: #334155; color: white; }

.window-box {
    margin-top: 10px;
    background: #0f172a;
    padding: 12px;
    border-radius: 10px;
    max-height: 150px;
    overflow-y: auto;
    font-size: 13px;
    border: 1px solid #334155;
    color: #cbd5e1;
}

.log-item, .chat-item { padding: 6px 0; border-bottom: 1px solid #1e293b; line-height: 1.4; }
.log-item:last-child, .chat-item:last-child { border-bottom: none; }

.badge { padding: 2px 6px; border-radius: 6px; font-size: 11px; font-weight: 700; margin-left: 5px; }
.badge-accept { background: rgba(16, 185, 129, 0.2); color: #34d399; }
.badge-reject { background: rgba(239, 68, 68, 0.2); color: #f87171; }

#status {
    margin-top: 15px;
    font-weight: 700;
    text-align: center;
    padding: 10px;
    border-radius: 10px;
    background: rgba(0, 0, 0, 0.2);
}

.stats-bar {
    display: flex;
    justify-content: space-around;
    background: #1e293b;
    padding: 12px;
    border-radius: 12px;
    border: 1px solid #334155;
    text-align: center;
}
.stat-box th { font-size: 11px; color: #94a3b8; text-transform: uppercase; }
.stat-box td { font-size: 18px; font-weight: 700; padding-top: 4px; }

.room-header {
    text-align: center;
    font-size: 13px;
    color: #3b82f6;
    font-weight: 700;
    background: rgba(59, 130, 246, 0.1);
    padding: 8px;
    border-radius: 8px;
    margin-bottom: 10px;
}
</style>

<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
<script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
</head>

<body>

<div class="container">
    
    <div id="loginSection" class="login-screen">
        <h1>🤝 Ateşkes Merkezine Giriş</h1>
        <p style="color: #94a3b8; font-size: 14px; margin-bottom: 20px;">Lütfen arkadaşınızla paylaşacağınız oda kodunu girin.</p>
        
        <label for="roomInput" style="text-align: left;">Oda Kodu (Sayı veya Kelime)</label>
        <input id="roomInput" placeholder="Örn: 1453 veya baris-odasi">
        
        <div class="btn-group">
            <button onclick="joinRoom()" style="background: #3b82f6; color: white; padding: 14px;">Odaya Katıl / Oluştur</button>
            <button onclick="generateRandomRoom()" style="background: #475569; color: white; padding: 14px; flex: 0 0 140px;">Rastgele Kod Al</button>
        </div>
    </div>

    <div id="mainSection" style="display: none; flex-direction: column; gap: 20px;">
        
        <div class="room-header" id="roomDisplay">🔒 Oda: #0000</div>

        <div class="stats-bar">
            <table style="width: 100%;">
                <tr class="stat-box">
                    <th>🕊️ Sağlanan Barış</th>
                    <th>🔥 İptal / Sıfırlama</th>
                </tr>
                <tr class="stat-box">
                    <td id="stat-peace" style="color: #10b981;">0</td>
                    <td id="stat-reset" style="color: #64748b;">0</td>
                </tr>
            </table>
        </div>

        <div class="card" id="mainCard">
            <h1>🤝 Online Ateşkes</h1>

            <label for="name">Kullanıcı Adı</label>
            <input id="name" placeholder="Adınızı yazın...">

            <label for="message">Barış Mesajı (İsteğe Bağlı)</label>
            <textarea id="message" placeholder="Anlaşma notu..."></textarea>

            <div class="btn-group">
                <button class="accept" onclick="sign('KABUL')">✔ Kabul Et</button>
                <button class="reject" onclick="sign('RED')">❌ Reddet</button>
            </div>
            
            <button class="reset" onclick="resetSystem()">🔄 Odadaki Verileri Sıfırla</button>

            <div id="status">⏳ Bağlanılıyor...</div>
            
            <div style="margin-top: 20px; font-size: 13px; color: #94a3b8; font-weight: 600; border-bottom: 1px solid #334155; padding-bottom: 6px;">📜 Canlı İşlem Akışı</div>
            <div class="window-box" id="log"></div>
        </div>

        <div class="card">
            <h2>💬 Canlı Sohbet Odası</h2>
            <div class="window-box" id="chatBox" style="height: 180px; max-height: 180px;"><i>Henüz mesaj yok...</i></div>
            
            <div style="display: flex; gap: 8px; margin-top: 10px;">
                <input id="chatMsg" placeholder="Mesajınızı yazın ve Enter'a basın..." onkeypress="if(event.key === 'Enter') sendChat()">
                <button onclick="sendChat()" style="flex: 0 0 80px; background: #3b82f6; color: white; margin-top: 6px;">Gönder</button>
            </div>
        </div>

    </div>

</div>

<script>
const firebaseConfig = {
    apiKey: "AIzaSyCBwMi4bBNx0XwpHaj7Ng7NHifYZoJkMYk",
    authDomain: "ateskes-projesi-f3f75.firebaseapp.com",
    databaseURL: "https://ateskes-projesi-f3f75-default-rtdb.europe-west1.firebasedatabase.app/",
    projectId: "ateskes-projesi-f3f75",
    storageBucket: "ateskes-projesi-f3f75.firebasestorage.app",
    messagingSenderId: "507944127548",
    appId: "1:507944127548:web:3294d33c587701d4d28739"
};

firebase.initializeApp(firebaseConfig);
const database = firebase.database();

let peaceRef, chatRef, statsRef;
let currentLogs = [];
let confettiTriggered = false; 
let activeRoomId = "";

const logDiv = document.getElementById("log");
const chatDiv = document.getElementById("chatBox");
const statusDiv = document.getElementById("status");
const mainCard = document.getElementById("mainCard");
const nameInput = document.getElementById("name");
const messageInput = document.getElementById("message");
const chatMsgInput = document.getElementById("chatMsg");

// 🎲 Rastgele Oda Kodu Üretme
function generateRandomRoom() {
    const randomCode = Math.floor(1000 + Math.random() * 9000).toString();
    document.getElementById("roomInput").value = randomCode;
}

// 🚪 Odaya Giriş Yapma Mantığı
function joinRoom() {
    const roomCode = document.getElementById("roomInput").value.trim().toLowerCase();
    if (roomCode === "") { alert("Lütfen bir oda kodu girin veya rastgele kod alın."); return; }
    
    activeRoomId = roomCode;
    
    // Veritabanı yollarını odaya özel olarak bağla
    peaceRef = database.ref(`multi_rooms/${activeRoomId}/peace_logs`);
    chatRef = database.ref(`multi_rooms/${activeRoomId}/chat_logs`);
    statsRef = database.ref(`multi_rooms/${activeRoomId}/stats`);
    
    // Arayüzü Değiştir
    document.getElementById("loginSection").style.display = "none";
    document.getElementById("mainSection").style.display = "flex";
    document.getElementById("roomDisplay").innerText = `🔒 Giriş Yapılan Özel Oda: #${activeRoomId.toUpperCase()}`;
    
    // Dinleyicileri Başlat
    startDatabaseListeners();
}

function startDatabaseListeners() {
    // 1. Canlı İmza Takibi
    peaceRef.on("value", (snapshot) => {
        const data = snapshot.val();
        currentLogs = [];
        if (data) { Object.keys(data).forEach(key => currentLogs.push(data[key])); }
        render(currentLogs);
    });

    // 2. Canlı Sohbet Odası Takibi
    chatRef.on("value", (snapshot) => {
        const data = snapshot.val();
        if (!data) {
            chatDiv.innerHTML = "<i>Bu odada henüz mesaj yok...</i>";
            return;
        }
        let chatHTML = "";
        Object.keys(data).forEach(key => {
            const msg = data[key];
            chatHTML += `<div class="chat-item">🕒 <b>${msg.time}</b> | <b>${msg.user}:</b> ${msg.text}</div>`;
        });
        chatDiv.innerHTML = chatHTML;
        chatDiv.scrollTop = chatDiv.scrollHeight;
    });

    // 3. Canlı İstatistik Takibi
    statsRef.on("value", (snapshot) => {
        const stats = snapshot.val() || { peaceCount: 0, resetCount: 0 };
        document.getElementById("stat-peace").innerText = stats.peaceCount || 0;
        document.getElementById("stat-reset").innerText = stats.resetCount || 0;
    });
}

function sign(status){
    const name = nameInput.value.trim();
    const message = messageInput.value.trim();
    if(name === ""){ alert("Lütfen önce Kullanıcı Adı alanını doldurun."); return; }

    const alreadySigned = currentLogs.some(x => x.name.toLowerCase() === name.toLowerCase());
    if(alreadySigned){ alert("Bu isimle zaten işlem yapılmış."); return; }

    const time = new Date().toLocaleTimeString('tr-TR', { hour: '2-digit', minute: '2-digit' });
    peaceRef.push({ name, status, message, time });
    
    localStorage.setItem("chat_username", name);
    nameInput.value = ""; messageInput.value = ""; 
}

function sendChat() {
    const text = chatMsgInput.value.trim();
    if (text === "") return;

    let savedUser = localStorage.getItem("chat_username") || nameInput.value.trim();
    if (!savedUser || savedUser === "") { savedUser = "Misafir"; }

    const time = new Date().toLocaleTimeString('tr-TR', { hour: '2-digit', minute: '2-digit' });
    
    chatRef.push({ user: savedUser, text: text, time: time });
    chatMsgInput.value = "";
}

function render(logs){
    if(logs.length === 0) {
        logDiv.innerHTML = "<i>Henüz imza atılmadı.</i>";
        confettiTriggered = false;
    } else {
        logDiv.innerHTML = logs.map(x => `
            <div class="log-item">
                🕒 <b>${x.time}</b> - <b>${x.name}</b> 
                <span class="badge ${x.status === 'KABUL' ? 'badge-accept' : 'badge-reject'}">${x.status === 'KABUL' ? 'Kabul Etti' : 'Reddetti'}</span>
                ${x.message ? `<br><span style="color:#64748b; font-style:italic; padding-left:15px;">💬 "${x.message}"</span>` : ''}
            </div>
        `).join("");
    }

    const acceptCount = logs.filter(x => x.status === "KABUL").length;
    const buttons = document.querySelectorAll(".accept, .reject");

    if(acceptCount >= 2){
        statusDiv.innerHTML = "🎉 ATEŞKES YÜRÜRLÜKTE";
        statusDiv.style.color = "#10b981";
        document.body.style.background = "#064e3b"; 
        mainCard.style.borderColor = "#10b981";

        if (!confettiTriggered) {
            playDigitalDing();
            triggerConfetti();
            
            statsRef.once("value", (snap) => {
                let current = snap.val() || { peaceCount: 0, resetCount: 0 };
                statsRef.update({ peaceCount: (current.peaceCount || 0) + 1 });
            });

            confettiTriggered = true;
        }
        buttons.forEach(btn => btn.disabled = true);
    } else {
        statusDiv.innerHTML = "🔴 Ateşkes bekleniyor (" + acceptCount + "/2)";
        statusDiv.style.color = "#f43f5e";
        document.body.style.background = "#0f172a"; 
        mainCard.style.borderColor = "#334155";
        confettiTriggered = false;
        buttons.forEach(btn => btn.disabled = false);
    }
}

function playDigitalDing() {
    try {
        const AudioContext = window.AudioContext || window.webkitAudioContext;
        if (!AudioContext) return;
        const ctx = new AudioContext();
        let osc = ctx.createOscillator(); let gain = ctx.createGain();
        osc.type = 'sine'; osc.frequency.setValueAtTime(880, ctx.currentTime);
        gain.gain.setValueAtTime(0.2, ctx.currentTime);
        gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.5);
        osc.connect(gain); gain.connect(ctx.destination);
        osc.start(); osc.stop(ctx.currentTime + 0.5);
    } catch(e) {}
}

function triggerConfetti() {
    var duration = 2.5 * 1000; var end = Date.now() + duration;
    (function frame() {
        confetti({ particleCount: 4, angle: 60, spread: 55, origin: { x: 0 } });
        confetti({ particleCount: 4, angle: 120, spread: 55, origin: { x: 1 } });
        if (Date.now() < end) { requestAnimationFrame(frame); }
    }());
}

function resetSystem(){
    if(confirm("Bu odadaki tüm verileri temizlemek istiyor musunuz?")) {
        peaceRef.set(null);
        chatRef.set(null);
        
        statsRef.once("value", (snap) => {
            let current = snap.val() || { peaceCount: 0, resetCount: 0 };
            statsRef.update({ resetCount: (current.resetCount || 0) + 1 });

        });
        
    }
}
</script>
</body>
</html>
